<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航程 讲座分享系列 - 视障讲者分享学习、工作中的真实经验</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poster-container">
        <!-- Top Blue Section -->
        <header class="top-section">
            <div class="header-logos">
                <!-- Left: Lighthouse Logo -->
                <div class="logo-unit lighthouse">
                    <img src="lighthouse_logo.png" alt="灯塔力量 Lighthouse Impact" class="logo-img">
                </div>

                <!-- Center: Joint Host Text -->
                <div class="joint-host">联合主办</div>

                <!-- Right: Bethel Logo + Org Name -->
                <div class="logo-unit bethel">
                    <img src="bethel_logo.png" alt="bethel 爱百福" class="logo-img-bethel">
                    <div class="org-name">北京爱百福视障人士关爱中心</div>
                </div>
            </div>

            <div class="main-title">
                <h1 class="voyage">航程</h1>
                <h2 class="subtitle">讲座分享系列</h2>
            </div>

            <p class="description">
                不同学科与职业背景的视障讲者将分享学习、工作中的真实经验，呈现多样化的人生航程。欢迎视障学生、家长及公众人士参与交流。
            </p>

            <div class="speaker-section">
                <div class="speaker-label">分享嘉宾</div>
                <div class="speaker-card">
                    <h3 class="speaker-name">赵晨</h3>
                    <p class="speaker-desc">美国爱达荷学院全奖奖学金</p>
                    <p class="speaker-desc">主修音乐 辅修计算机和心理学</p>
                </div>
            </div>

            <div class="event-details">
                <div class="time">2026年4月4日 周六晚20:00-21:00</div>
                <div class="platform">微信视频直播</div>
            </div>
        </header>

        <!-- Bottom White Section -->
        <footer class="bottom-section">
            <div class="qr-container">
                <p class="qr-text">长按二维码获取直播链接</p>
                <img src="qrcode.png" alt="微信直播间二维码" class="qr-code">
            </div>
        </footer>
    </div>
</body>
</html>
